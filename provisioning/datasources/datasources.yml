apiVersion: 1

datasources:
  - name: 'thruk-datasource'
    uid: 'sni-thruk-datasource'
    type: 'sni-thruk-datasource'
    url: 'https://demo.thruk.org/demo/thruk'
    access: proxy
    isDefault: false
    orgId: 1
    version: 1
    editable: true
    basicAuth: true
    basicAuthUser: test
    jsonData:
      authType: basic
      path: '/resources'
      logPath: '/root/sni-thruk-datasource/logs/grafana-thruk-datasource.log'
      logLevel: 3
    secureJsonData:
      apiKey: 'api-key'
      basicAuthPassword: test
